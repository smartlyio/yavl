# NPM token validation — ensures the publish token is valid before merge.
#
# npm tokens on npmjs.com expire after at most 90 days. If the token expires
# without being rotated, the Publish workflow will fail silently after merge.
# This check catches that problem early, during the PR review stage.
#
# Two layers of protection:
#   1. `npm whoami` — verifies the token is currently valid (catches expired
#      or revoked tokens immediately).
#   2. Expiry date tracking — uses the NPM_TOKEN_EXPIRY repository variable
#      to warn BEFORE the token expires, giving maintainers time to rotate it.
#
# When rotating the token:
#   1. Go to https://www.npmjs.com/settings/tokens
#   2. Generate a new Automation token with publish access
#   3. Update the NPM_TOKEN secret:
#      https://github.com/smartlyio/yavl/settings/secrets/actions
#   4. Update the NPM_TOKEN_EXPIRY variable (YYYY-MM-DD format):
#      https://github.com/smartlyio/yavl/settings/variables/actions

name: NPM Token Check

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

jobs:
  check-npm-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check NPM token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN_EXPIRY: ${{ vars.NPM_TOKEN_EXPIRY }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: ./.github/scripts/check-npm-token.sh
